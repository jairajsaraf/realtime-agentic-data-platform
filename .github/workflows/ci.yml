name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs widen scope only where needed (publish-image: packages: write).
permissions:
  contents: read

jobs:
  test:
    name: lint + unit tests (file://)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.21"
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Unit tests
        run: uv run pytest -m "not localstack" --cov=rtdp --cov-branch --cov-report=term-missing --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}


  # Run the telemetry suite with the optional [otel] extra so Codecov sees the OTel-enabled
  # branches (the default `test` job installs no extra and can only reach the no-op paths).
  # Key-free: reuses the existing CODECOV_TOKEN; the tests never export spans over the network.
  telemetry-otel:
    name: telemetry coverage ([otel] extra)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.21"
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies (with [otel] extra)
        run: uv sync --frozen --extra otel
      - name: Telemetry tests (OTel-enabled branches)
        run: uv run --extra otel -- pytest tests/test_telemetry.py -m "not localstack" --cov=rtdp.telemetry --cov-branch --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}


  # Run the MCP server suite with the optional [mcp] extra (the default `test` job installs no
  # extra, so tests/test_mcp_server.py skips there and only the import-guard/boundary tests run).
  # Deterministic and offline: the suite drives the 2A app in-process via an injected TestClient;
  # no MCP client, no network, no Docker. Does not gate publish-image/deploy — the deployed image
  # never includes the [mcp] extra.
  mcp-extra:
    name: mcp server ([mcp] extra)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.21"
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies (with [mcp] extra)
        run: uv sync --frozen --extra mcp
      - name: MCP tests (server + CLI wiring)
        run: uv run --extra mcp -- pytest tests/test_mcp_server.py tests/test_mcp_cli.py -m "not localstack" --cov=rtdp.mcp --cov-branch --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}


  integration-localstack:
    name: integration tests (LocalStack S3)
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          SERVICES: s3
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.21"
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health >/dev/null; then
              echo "LocalStack ready"; exit 0
            fi
            sleep 2
          done
          echo "LocalStack did not become ready" >&2; exit 1
      - name: Integration tests
        run: uv run pytest -m localstack


  # Build the image and assert GET /health == 200 on the file:// synthetic backend.
  # Runs on every push + PR. Never logs in to or pushes to GHCR; needs no secrets.
  docker-smoke:
    name: docker image build + /health smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax check (deploy scripts)
        run: bash -n deploy/host_deploy.sh deploy/bootstrap_host.sh
      - name: Build image
        run: docker build -t rtdp:ci .
      - name: Container /health smoke (file:// synthetic)
        env:
          IMAGE: rtdp:ci
          SKIP_BUILD: "1"
        run: bash scripts/docker_smoke.sh
      - name: Validate deploy compose config
        env:
          MINIO_ROOT_USER: ci
          MINIO_ROOT_PASSWORD: ci-placeholder
        run: docker compose -f deploy/docker-compose.yml config --quiet
      # Assert the RTDP_MINIO_DATA_PATH toggle, the stream `ingestion` gate, and the deploy liveness
      # probe (api healthcheck + DEPLOY_HEALTH_URL default) render/read as intended. Fail-closed and
      # stdlib-only: renders are parsed with json + direct indexing, so a bad render, malformed JSON,
      # or a missing field raises (nonzero exit) instead of being silently skipped.
      - name: Assert MinIO source, stream gate, and deploy liveness probe (fail-closed, stdlib only)
        env:
          MINIO_ROOT_USER: ci
          MINIO_ROOT_PASSWORD: ci-placeholder
        run: |
          python3 - <<'PY'
          import json, os, pathlib, subprocess

          def render(extra_env, *profile_args):
              env = {**os.environ, **extra_env}
              proc = subprocess.run(
                  ["docker", "compose", "-f", "deploy/docker-compose.yml",
                   *profile_args, "config", "--format", "json"],
                  check=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE,
                  text=True, env=env,
              )
              return json.loads(proc.stdout)  # malformed JSON -> JSONDecodeError -> nonzero exit

          def mount_at(model, service, target):
              mounts = model["services"][service]["volumes"]  # missing key -> KeyError -> nonzero exit
              matches = [m for m in mounts if m["target"] == target]
              if len(matches) != 1:
                  raise SystemExit(f"{service}: expected one mount at {target!r}, got {mounts!r}")
              return matches[0]

          # 1) Default: an empty RTDP_MINIO_DATA_PATH must fall back (`:-`) to the named volume.
          m = mount_at(render({"RTDP_MINIO_DATA_PATH": ""}, "--profile", "s3"), "minio", "/data")
          assert m["type"] == "volume", f"default mount type: {m['type']!r}"
          assert m["source"] == "minio-data", f"default mount source: {m['source']!r}"
          assert m["target"] == "/data", f"default mount target: {m['target']!r}"
          print("OK default: minio /data -> named volume minio-data")

          # 2) Override: an absolute host path must render as a bind mount.
          m = mount_at(render({"RTDP_MINIO_DATA_PATH": "/mnt/test-minio/data"}, "--profile", "s3"), "minio", "/data")
          assert m["type"] == "bind", f"override mount type: {m['type']!r}"
          assert m["source"] == "/mnt/test-minio/data", f"override mount source: {m['source']!r}"
          assert m["target"] == "/data", f"override mount target: {m['target']!r}"
          print("OK override: minio /data -> bind /mnt/test-minio/data")

          # 3) The stream writer must be gated behind the `ingestion` profile (not the default set).
          profiles = render({}, "--profile", "ingestion")["services"]["stream"]["profiles"]
          assert profiles == ["ingestion"], f"stream.profiles: {profiles!r}"
          print("OK stream: profiles == ['ingestion']")

          # 4) The API healthcheck must probe the liveness endpoint /livez, not readiness /health, so a
          #    fresh host with no table still becomes healthy without starting ingestion.
          hc = render({}, "--profile", "s3")["services"]["api"]["healthcheck"]["test"]
          hc_joined = " ".join(hc) if isinstance(hc, list) else str(hc)
          assert "/livez" in hc_joined, f"api healthcheck must probe /livez: {hc!r}"
          assert "/health" not in hc_joined, f"api healthcheck must NOT probe /health: {hc!r}"
          print("OK healthcheck: api probes /livez (not /health)")

          # 5) The deploy probe must keep the DEPLOY_HEALTH_URL name and default to the /livez endpoint.
          hd = pathlib.Path("deploy/host_deploy.sh").read_text(encoding="utf-8")
          assert "DEPLOY_HEALTH_URL" in hd, "host_deploy.sh must keep the DEPLOY_HEALTH_URL variable"
          assert "DEPLOY_HEALTH_URL:-http://127.0.0.1:8000/livez" in hd, "host_deploy.sh must default DEPLOY_HEALTH_URL to /livez"
          print("OK deploy probe: DEPLOY_HEALTH_URL defaults to /livez")
          PY

  # Publish the image to GHCR on main only, using the built-in GITHUB_TOKEN (no external secret).
  publish-image:
    name: publish image (GHCR)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, telemetry-otel, integration-localstack, docker-smoke]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve lowercase image ref
        id: ref
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      # The deployed image carries the optional [otel] extra so telemetry is *available* on the
      # host. It stays no-op unless RTDP_OTEL_ENABLED=true at run time; the default `docker-smoke`
      # build (no build-arg) still validates the lean, dependency-free image.
      - name: Build and tag
        run: |
          docker build \
            --build-arg RTDP_INSTALL_EXTRAS=otel \
            -t "${{ steps.ref.outputs.image }}:${{ github.sha }}" \
            -t "${{ steps.ref.outputs.image }}:latest" .
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push image tags
        run: |
          docker push "${{ steps.ref.outputs.image }}:${{ github.sha }}"
          docker push "${{ steps.ref.outputs.image }}:latest"

  # Real, gated deploy. Runs ONLY on a push to `main`, behind the protected `production`
  # environment (configure required reviewers there for manual approval), and only after the image
  # is published. Uses raw OpenSSH — no third-party action ever handles the key: the private key is
  # written to a 0600 temp file; the host key is verified against the pinned DEPLOY_SSH_KNOWN_HOSTS
  # secret when set (else a warned-about ssh-keyscan fallback); the deploy path + the approved
  # commit's SHA-pinned image are passed as positional args to the reviewed host script
  # (deploy/host_deploy.sh), which runs `docker compose pull && up -d` plus a post-deploy /health
  # check and exits non-zero on failure. Secrets come from the `production` environment, never echoed.
  deploy:
    name: deploy (gated)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, integration-localstack, docker-smoke, publish-image]
    permissions:
      contents: read
    environment: production
    steps:
      - name: Deploy over SSH (host runs compose pull + up + /health check)
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PATH: ${{ secrets.DEPLOY_SSH_PATH }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          umask 077
          key_file="$(mktemp)"
          known_hosts="$(mktemp)"
          trap 'rm -f "$key_file" "$known_hosts"' EXIT
          # Private key -> 0600 temp file. mktemp already creates it 0600 under umask 077; chmod is
          # explicit. The key is read from the env (masked) and never printed.
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$key_file"
          chmod 600 "$key_file"
          # Prefer an out-of-band pinned host key (DEPLOY_SSH_KNOWN_HOSTS). Fall back to in-band
          # ssh-keyscan (trust-on-first-use) with a warning when it is unset — pin it in E6.2.
          if [ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$known_hosts"
          else
            echo "WARNING: DEPLOY_SSH_KNOWN_HOSTS is unset; falling back to in-band ssh-keyscan (TOFU). Pin it in E6.2." >&2
            ssh-keyscan -H "$DEPLOY_SSH_HOST" > "$known_hosts"
          fi
          # Deploy the APPROVED commit's immutable image (publish-image pushed :$GITHUB_SHA); never
          # rely on :latest, which a queued/approved run could resolve to a newer commit.
          image_ref="ghcr.io/$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]'):${GITHUB_SHA}"
          # Pass the deploy path + image ref as POSITIONAL parameters ($1/$2) to a fixed remote script
          # read from stdin (bash -s) — they are consumed as "$1"/"$2", never interpolated into a
          # command, so a path containing quotes/backticks/$() is a literal value, not evaluated.
          # printf %q only escapes them for safe transport through ssh's single-string re-parse. No eval.
          ssh -i "$key_file" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$known_hosts" \
            "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            "bash -s -- $(printf '%q' "$DEPLOY_SSH_PATH") $(printf '%q' "$image_ref") $(printf '%q' "$GITHUB_SHA")" <<'REMOTE'
          set -euo pipefail
          deploy_path="$1"
          image_ref="$2"
          expected_sha="$3"
          cd "$deploy_path"
          # Authoritative checkout-alignment guard — runs from the approved stdin wrapper, so it is
          # enforced even if the host's own deploy/host_deploy.sh is stale (Codex PR #10 P1). Verify-only:
          # no git fetch/checkout, no self-heal.
          if ! host_sha="$(git rev-parse HEAD 2>/dev/null)"; then
            echo "ERROR: $deploy_path is not a git checkout; cannot verify deploy alignment." >&2
            exit 1
          fi
          if [ "$host_sha" != "$expected_sha" ]; then
            echo "ERROR: host checkout $host_sha does not match the approved commit $expected_sha." >&2
            echo "       Advance $deploy_path to the approved commit out-of-band (git fetch + checkout), then re-run." >&2
            exit 1
          fi
          # Reject a dirty worktree — a matching HEAD with local edits would still deploy unapproved
          # config (Codex PR #10 P2). --porcelain catches tracked edits AND untracked files; it ignores
          # gitignored files (e.g. a host .env). Fail closed if the status command itself fails, and do
          # not print the file list (avoid leaking filenames into Actions logs).
          if ! dirty_status="$(git status --porcelain)"; then
            echo "ERROR: failed to inspect host checkout worktree state." >&2
            exit 1
          fi
          if [ -n "$dirty_status" ]; then
            echo "ERROR: host checkout has uncommitted or untracked changes; refusing to deploy." >&2
            exit 1
          fi
          RTDP_IMAGE="$image_ref" RTDP_DEPLOY_EXPECTED_SHA="$expected_sha" bash deploy/host_deploy.sh
          REMOTE
