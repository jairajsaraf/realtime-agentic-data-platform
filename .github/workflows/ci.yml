name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + unit tests (file://)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.21"
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Unit tests
        run: uv run pytest -m "not localstack" --cov=rtdp --cov-branch --cov-report=term-missing --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}


  integration-localstack:
    name: integration tests (LocalStack S3)
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          SERVICES: s3
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.21"
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health >/dev/null; then
              echo "LocalStack ready"; exit 0
            fi
            sleep 2
          done
          echo "LocalStack did not become ready" >&2; exit 1
      - name: Integration tests
        run: uv run pytest -m localstack
