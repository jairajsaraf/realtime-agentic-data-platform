# Stage E — single-host deployed topology (one image, multiple entrypoints).
#
# Run from the repo root:
#   docker compose -f deploy/docker-compose.yml up -d --build              # file:// (default)
#   docker compose -f deploy/docker-compose.yml --profile s3 up -d         # MinIO / aws backend
#   docker compose -f deploy/docker-compose.yml --profile ingestion up -d  # add the stream writer
#
# The `stream` writer is opt-in behind the `ingestion` profile — a bare `up -d` starts only `api`,
# so the host's COMPOSE_PROFILES=s3,edge,observability set does not select the writer (explicitly
# targeting `stream` can still start it). MinIO's object-data source is set by RTDP_MINIO_DATA_PATH
# (Compose/deploy-only, NOT an app setting): unset -> the `minio-data` named volume; an absolute host
# path -> a bind mount. See deploy/README.md.
#
# Backend selection is env-driven so the same app services run on the file:// backend (the
# default, runnable with no secrets) or on an S3-compatible store. For the MinIO path, set
# RTDP_STORAGE_BACKEND=aws and bring up the `s3` profile; the rtdp `aws` backend honors
# RTDP_S3_ENDPOINT_URL (config Risk R1 support) and the MinIO bucket is created by `minio-init`.
# Secrets/config are supplied at run time (e.g. `doppler run -- docker compose ...` or a local,
# gitignored .env) — see deploy/README.md and deploy/.env.example. No real keys are committed.

x-rtdp-image: &rtdp-image
  build:
    context: ..
    dockerfile: Dockerfile
  # Local default builds `rtdp:local` from the Dockerfile above. On the deployed host set
  # RTDP_IMAGE=ghcr.io/<owner>/<repo>:latest so `docker compose pull` fetches the published image
  # instead of building; the `build:` section stays harmless (only used by `up --build`).
  image: ${RTDP_IMAGE:-rtdp:local}

x-rtdp-env: &rtdp-env
  RTDP_STORAGE_BACKEND: ${RTDP_STORAGE_BACKEND:-file}
  RTDP_LOCAL_WAREHOUSE_DIR: /data/warehouse
  RTDP_CATALOG_DB_PATH: /data/warehouse/catalog.db   # catalog is local SQLite in every backend
  # S3-compatible (MinIO/AWS) — used only when RTDP_STORAGE_BACKEND=aws. Uses `-` (not `:-`) so an
  # explicitly empty RTDP_S3_ENDPOINT_URL passes through unchanged (real AWS); unset → MinIO default.
  RTDP_S3_ENDPOINT_URL: ${RTDP_S3_ENDPOINT_URL-http://minio:9000}
  RTDP_S3_BUCKET: ${RTDP_S3_BUCKET:-lakehouse}
  RTDP_AWS_ACCESS_KEY_ID: ${RTDP_AWS_ACCESS_KEY_ID:-}
  RTDP_AWS_SECRET_ACCESS_KEY: ${RTDP_AWS_SECRET_ACCESS_KEY:-}
  RTDP_AWS_REGION: ${RTDP_AWS_REGION:-us-east-1}
  # --- observability (Stage E6) — OFF by default. The telemetry boundary stays no-op unless
  # RTDP_OTEL_ENABLED=true AND the deployed image carries the optional [otel] extra. On the host
  # (with the `observability` profile) point the endpoint at the Datadog Agent's OTLP gRPC receiver:
  # RTDP_OTEL_EXPORTER_OTLP_ENDPOINT=http://datadog-agent:4317. Never required by `/health` or CI.
  RTDP_OTEL_ENABLED: ${RTDP_OTEL_ENABLED:-false}
  RTDP_OTEL_EXPORTER_OTLP_ENDPOINT: ${RTDP_OTEL_EXPORTER_OTLP_ENDPOINT:-}
  RTDP_OTEL_SERVICE_NAME: ${RTDP_OTEL_SERVICE_NAME:-rtdp}

services:
  # Public read API (the only externally exposed app service).
  api:
    <<: *rtdp-image
    command: ["serve"]
    environment:
      <<: *rtdp-env
      RTDP_API_HOST: "0.0.0.0"
      RTDP_API_PORT: "8000"
    ports:
      # Host bind is configurable. Default 0.0.0.0 preserves current local behavior. On the public
      # host set RTDP_API_BIND=127.0.0.1 so port 8000 is NOT exposed to the internet — Caddy (the
      # `edge` profile) terminates TLS and reaches the API as `api:8000` over the compose network.
      # Binding to 127.0.0.1 (not merely a UFW rule) is what keeps 8000 private: Docker publishes
      # ports via its own iptables chain that bypasses UFW.
      - "${RTDP_API_BIND:-0.0.0.0}:8000:8000"
    volumes:
      - rtdp-state:/data
    restart: unless-stopped
    healthcheck:
      # /health returns 503 until a table exists, 200 once the catalog/table load.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # The sole writer: appends one micro-batch snapshot per interval (synthetic source).
  # Opt-in behind the `ingestion` profile: a service with no profile is always started, so the writer
  # starts only when `ingestion` is active. The host runs COMPOSE_PROFILES=s3,edge,observability (no
  # `ingestion`), so a bare `up -d` does not select the writer; locally add `--profile ingestion` (or
  # COMPOSE_PROFILES=ingestion) to run it.
  stream:
    <<: *rtdp-image
    command: ["stream", "--source", "synthetic"]
    environment:
      <<: *rtdp-env
      RTDP_STREAM_INTERVAL_SECONDS: "${RTDP_STREAM_INTERVAL_SECONDS:-60}"
    volumes:
      - rtdp-state:/data
    restart: unless-stopped
    stop_signal: SIGINT          # the stream loop traps SIGINT only (plan Risk R3)
    depends_on:
      - api
    profiles: ["ingestion"]

  # One-shot snapshot maintenance (metadata-only). Run on demand or from a host timer:
  #   docker compose -f deploy/docker-compose.yml run --rm maintain
  # Schedule so it does not overlap a stream commit (single-writer SQLite, plan Risk R2).
  maintain:
    <<: *rtdp-image
    command: ["maintain", "expire-snapshots"]
    environment:
      <<: *rtdp-env
    volumes:
      - rtdp-state:/data
    profiles: ["maintain"]
    restart: "no"

  # --- edge (profile "edge"): Caddy reverse proxy with automatic Let's Encrypt HTTPS ---
  # Fronts the read API. Local: RTDP_PUBLIC_HOSTNAME defaults to `localhost`, so Caddy serves with
  # its internal CA (test via `curl -k https://localhost/health`). Public host: set
  # RTDP_PUBLIC_HOSTNAME to the real domain (DNS A-record -> droplet, ports 80/443 open) and Caddy
  # provisions a real Let's Encrypt certificate automatically. Profile-gated, so the default local
  # path (file:// / MinIO) is unchanged and `docker compose config` stays key-free.
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      RTDP_PUBLIC_HOSTNAME: ${RTDP_PUBLIC_HOSTNAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # persisted certs/ACME state — keep across restarts to avoid re-issuance
      - caddy-config:/config
    depends_on:
      - api
    profiles: ["edge"]
    restart: unless-stopped

  # --- observability (profile "observability"): Datadog Agent receiving OTLP from the app ---
  # The app's telemetry boundary (api/stream/agent) exports traces over OTLP gRPC; this Agent
  # receives them on 4317, reached as `datadog-agent:4317` on the internal compose network. The
  # port is NOT published to the host. Requires DD_API_KEY at run time (Doppler / host env), so the
  # service is profile-gated and is NOT part of the default/local path — `docker compose config`
  # still renders with the empty default. `/health` and CI never depend on this service, and no
  # `/metrics` scrape endpoint is added.
  datadog-agent:
    # Pinned to the exact version verified live in E6.3 (hostname fix, OTLP ingest, traces
    # end-to-end confirmed) instead of the moving `:7` tag.
    image: gcr.io/datadoghq/agent:7.80.3
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      # Explicit hostname (non-secret). A containerized Agent derives its host name from cloud
      # metadata (AWS/GCP/Azure only — NOT DigitalOcean) or the Docker socket (not mounted here), so
      # without this it cannot "reliably determine the host name" and exits. Default keeps the
      # `observability` profile self-contained; override via env/DD_HOSTNAME if needed.
      DD_HOSTNAME: ${DD_HOSTNAME:-rtdp-demo}
      # Enable the OTLP gRPC receiver (matches the app's gRPC OTLP exporter). 0.0.0.0 so sibling
      # containers can reach it on the compose network; it stays unpublished to the host.
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_GRPC_ENDPOINT: "0.0.0.0:4317"
    volumes:
      # Minimal http_check against the API's internal /health (E6.3, decision D4). Single read-only
      # file; reports the `http.can_connect` service check tagged `instance:rtdp_health`. The path
      # resolves relative to this compose file (deploy/), same pattern as Caddy's ./Caddyfile mount.
      - ./observability/http_check.yaml:/etc/datadog-agent/conf.d/http_check.d/conf.yaml:ro
    expose:
      - "4317"          # OTLP gRPC — internal compose network only (NOT published to the host)
    profiles: ["observability"]
    restart: unless-stopped

  # --- object storage (profile "s3"): self-hosted MinIO via the rtdp `aws` backend ---
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      # No secrets committed. Empty defaults (`:-`) keep the no-secrets file:// path runnable —
      # Compose interpolates the whole file before profile filtering, so a required `:?` here would
      # break `docker compose up` even without the `s3` profile. For the `s3` profile these MUST be
      # supplied at run time (Doppler / a local .env); MinIO refuses to start with empty root creds.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    expose:
      - "9000"                         # S3 API — internal network only (reached as minio:9000)
    ports:
      - "127.0.0.1:9001:9001"          # console bound to localhost only — private/local-only
    volumes:
      # MinIO object-data source is Compose/deploy-configurable (NOT an app setting). Unset/empty ->
      # the named volume `minio-data` (local/CI/rollback default). Set RTDP_MINIO_DATA_PATH to an
      # ABSOLUTE host path to switch to a bind mount (a persistent block volume); that host path must
      # be mounted persistently with a pre-created, MinIO-writable directory. Render & inspect before
      # deploy: `docker compose -f deploy/docker-compose.yml config`.
      - "${RTDP_MINIO_DATA_PATH:-minio-data}:/data"
    profiles: ["s3"]
    restart: unless-stopped

  # One-shot: create the warehouse bucket in MinIO (idempotent). The `aws` backend does not
  # auto-create buckets, so this replaces the LocalStack-only ensure_bucket for the MinIO path.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      # Empty defaults as above: required for the `s3` profile (set via Doppler / a local .env),
      # but must not block the default file:// path at Compose load time.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
      RTDP_S3_BUCKET: ${RTDP_S3_BUCKET:-lakehouse}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio..."; sleep 1;
        done
        mc mb --ignore-existing "local/$$RTDP_S3_BUCKET"
        echo "bucket ready: $$RTDP_S3_BUCKET"
    profiles: ["s3"]
    restart: "no"

volumes:
  rtdp-state:
  minio-data:
  caddy-data:
  caddy-config:
